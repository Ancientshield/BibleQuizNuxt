server {
    listen 80;
    server_name _;

    # nginx 預設的 trailing-slash 301 會用 $scheme 組 Location，
    # 在 Cloudflare Flexible SSL 下會吐出 http://... 導致瀏覽器再被降級一次。
    # 關掉 absolute_redirect，nginx 會用相對路徑做 redirect（瀏覽器自己補 scheme），
    # 徹底避開這個坑。
    absolute_redirect off;

    # 前端靜態檔案
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # 後端 API 反向代理
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Spring Security OAuth2 入口（前端按 Google/LINE/etc 後跳這裡）
    location /oauth2/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # OAuth provider callback（Google/LINE/etc 完事後 redirect 回這裡）
    location /login/oauth2/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
